<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Catálogo La Quillotana</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f6f8;
}

header{
background:#0f4c81;
color:white;
padding:15px 20px;
font-size:22px;
font-weight:bold;
}

.container{
padding:20px;
max-width:1400px;
margin:auto;
}

.search{
margin-bottom:20px;
}

.search input{
width:100%;
padding:12px;
font-size:16px;
border-radius:6px;
border:1px solid #ccc;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:18px;
}

.card{
background:white;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
overflow:hidden;
transition:0.2s;
}

.card:hover{
transform:translateY(-4px);
box-shadow:0 6px 16px rgba(0,0,0,0.15);
}

.card img{
width:100%;
height:180px;
object-fit:contain;
background:white;
padding:10px;
}

.card-body{
padding:12px;
}

.product-name{
font-size:15px;
font-weight:bold;
margin-bottom:6px;
}

.variant{
font-size:13px;
color:#555;
margin-bottom:8px;
}

.stock{
font-size:13px;
color:#0f4c81;
font-weight:bold;
}

.footer{
text-align:center;
padding:20px;
color:#666;
font-size:13px;
}

</style>

</head>

<body>

<header>
Catálogo de Productos – La Quillotana
</header>

<div class="container">

<div class="search">
<input type="text" id="search" placeholder="Buscar producto...">
</div>

<div class="grid" id="catalog"></div>

</div>

<div class="footer">
Catálogo generado automáticamente
</div>

<script>

let productos=[]

async function cargarCatalogo(){

const res = await fetch("https://api.quillotana.cl/catalogo")

const data = await res.json()

productos=data.productos

mostrar(productos)

}

function mostrar(lista){

const grid=document.getElementById("catalog")

grid.innerHTML=""

lista.forEach(p=>{

const card=document.createElement("div")
card.className="card"

card.innerHTML=`

<img loading="lazy"
src="${p.image}"
onerror="this.src='https://api.quillotana.cl/images/placeholder2.webp'">

<div class="card-body">

<div class="product-name">
${p.name}
</div>

<div class="variant">
${p.variant || ""}
</div>

<div class="stock">
Stock disponible
</div>

</div>
`

grid.appendChild(card)

})

}

document.getElementById("search").addEventListener("input",(e)=>{

const q=e.target.value.toLowerCase()

const filtrados=productos.filter(p=>

p.name.toLowerCase().includes(q) ||
(p.variant && p.variant.toLowerCase().includes(q))

)

mostrar(filtrados)

})

cargarCatalogo()

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Catálogo Distribuidora La Quillotana</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
margin:0;
background:#f4f6f9;
}

/* HEADER */

header{
background:#0b3a6f;
color:white;
padding:12px 20px;
display:flex;
align-items:center;
gap:15px;
box-shadow:0 2px 6px rgba(0,0,0,0.15);
}

header img{
height:40px;
}

header h1{
font-size:20px;
margin:0;
}

/* CONTENEDOR */

.container{
max-width:1400px;
margin:auto;
padding:20px;
}

/* BUSCADOR */

.search input{
width:100%;
padding:12px;
border-radius:6px;
border:1px solid #ccc;
font-size:15px;
}

/* FILTROS */

.filters{
margin-top:10px;
margin-bottom:20px;
}

.filters select{
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:18px;
}

/* CARD */

.card{
background:white;
border-radius:8px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
transition:0.2s;
}

.card:hover{
transform:translateY(-4px);
box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

.card img{
width:100%;
height:170px;
object-fit:contain;
background:white;
padding:10px;
}

.card-body{
padding:12px;
}

.product-name{
font-weight:bold;
font-size:15px;
margin-bottom:5px;
}

.variant{
font-size:13px;
color:#555;
}

.category{
font-size:12px;
color:#888;
margin-top:4px;
}

.footer{
text-align:center;
padding:25px;
color:#777;
font-size:13px;
}

</style>

</head>

<body>

<header>

<img src="https://api.quillotana.cl/images/logo.webp">

<h1>Catálogo Distribuidora La Quillotana</h1>

</header>

<div class="container">

<div class="search">
<input type="text" id="search" placeholder="Buscar producto...">
</div>

<div class="filters">
<select id="categoryFilter">
<option value="all">Todas las categorías</option>
</select>
</div>

<div class="grid" id="catalog"></div>

</div>

<div class="footer">
Distribuidora La Quillotana – Catálogo de productos
</div>

<script>

let productos=[]

async function cargarCatalogo(){

const res=await fetch("https://api.quillotana.cl/catalogo")
const data=await res.json()

productos=data.productos

generarCategorias()

mostrar(productos)

}

function generarCategorias(){

const set=new Set()

productos.forEach(p=>{
if(p.category) set.add(p.category)
})

const select=document.getElementById("categoryFilter")

Array.from(set).sort().forEach(cat=>{

const option=document.createElement("option")

option.value=cat
option.textContent=cat

select.appendChild(option)

})

}

function mostrar(lista){

const grid=document.getElementById("catalog")

grid.innerHTML=""

lista.forEach(p=>{

const card=document.createElement("div")

card.className="card"

card.innerHTML=`

<img loading="lazy"
src="${p.image}"
onerror="this.src='https://api.quillotana.cl/images/placeholder2.webp'">

<div class="card-body">

<div class="product-name">
${p.name}
</div>

<div class="variant">
${p.variant || ""}
</div>

<div class="category">
${p.category}
</div>

</div>
`

grid.appendChild(card)

})

}

function filtrar(){

const texto=document.getElementById("search").value.toLowerCase()

const categoria=document.getElementById("categoryFilter").value

const filtrados=productos.filter(p=>{

const coincideTexto=
p.name.toLowerCase().includes(texto) ||
(p.variant && p.variant.toLowerCase().includes(texto))

const coincideCategoria=
categoria==="all" || p.category===categoria

return coincideTexto && coincideCategoria

})

mostrar(filtrados)

}

document.getElementById("search").addEventListener("input",filtrar)

document.getElementById("categoryFilter").addEventListener("change",filtrar)

cargarCatalogo()

</script>

</body>
</html>
